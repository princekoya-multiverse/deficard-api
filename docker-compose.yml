version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: necard-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - necard-network
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: necard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - necard-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: necard-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: necard
      MYSQL_USER: necard
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - necard-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "necard", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  necard-network:
    driver: bridge

volumes:
  db_data:
